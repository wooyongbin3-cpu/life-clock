<?xml version="1.0" encoding="UTF-8"?>
<!-- Life Clock first-party ornament — soft constellation / paper grain motifs -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Life Clock ornament">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f1ea"/>
      <stop offset="50%" stop-color="#efe6db"/>
      <stop offset="100%" stop-color="#e7dccd"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c45c26"/>
      <stop offset="55%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#2f6f5e"/>
    </linearGradient>
    <radialGradient id="glowA" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#2f6f5e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2f6f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="90%" r="35%">
      <stop offset="0%" stop-color="#c45c26" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c45c26" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#3c2a1c" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.8" fill="#3c2a1c" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="960" height="540" fill="url(#paper)"/>
  <rect width="960" height="540" fill="url(#grid)"/>
  <rect width="960" height="540" fill="url(#dots)"/>
  <ellipse cx="220" cy="120" rx="260" ry="180" fill="url(#glowA)"/>
  <ellipse cx="780" cy="100" rx="220" ry="160" fill="url(#glowB)"/>
  <ellipse cx="480" cy="480" rx="300" ry="140" fill="url(#glowC)"/>

  <!-- Soft glass card silhouette -->
  <rect x="120" y="90" width="720" height="360" rx="28" fill="#fffdf9" fill-opacity="0.55" stroke="#3c2a1c" stroke-opacity="0.08"/>
  <rect x="120" y="90" width="720" height="360" rx="28" fill="none" stroke="url(#ember)" stroke-opacity="0.25" stroke-width="1.2"/>

  <!-- Clock face -->
  <circle cx="320" cy="270" r="110" fill="#fff" fill-opacity="0.35" stroke="#3c2a1c" stroke-opacity="0.1" stroke-width="1.5"/>
  <circle cx="320" cy="270" r="96" fill="none" stroke="url(#ember)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="200 402" transform="rotate(-90 320 270)"/>
  <circle cx="320" cy="270" r="4.5" fill="#c45c26"/>
  <line x1="320" y1="270" x2="320" y2="198" stroke="#2a221c" stroke-width="3" stroke-linecap="round"/>
  <line x1="320" y1="270" x2="372" y2="292" stroke="#2f6f5e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tick marks -->
  <g stroke="#3c2a1c" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round">
    <line x1="320" y1="168" x2="320" y2="176"/>
    <line x1="320" y1="364" x2="320" y2="372"/>
    <line x1="218" y1="270" x2="226" y2="270"/>
    <line x1="414" y1="270" x2="422" y2="270"/>
  </g>

  <!-- Typography blocks as shapes (decorative) -->
  <g fill="#2a221c">
    <rect x="480" y="160" width="280" height="14" rx="4" opacity="0.55"/>
    <rect x="480" y="186" width="210" height="10" rx="3" opacity="0.28"/>
    <rect x="480" y="210" width="250" height="10" rx="3" opacity="0.2"/>
    <rect x="480" y="234" width="180" height="10" rx="3" opacity="0.16"/>
  </g>

  <!-- Metric pills -->
  <g>
    <rect x="480" y="280" width="88" height="56" rx="14" fill="#fff" fill-opacity="0.5" stroke="#3c2a1c" stroke-opacity="0.08"/>
    <rect x="580" y="280" width="88" height="56" rx="14" fill="#fff" fill-opacity="0.5" stroke="#3c2a1c" stroke-opacity="0.08"/>
    <rect x="680" y="280" width="88" height="56" rx="14" fill="#fff" fill-opacity="0.5" stroke="#3c2a1c" stroke-opacity="0.08"/>
    <text x="524" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c45c26">Y</text>
    <text x="624" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2f6f5e">M</text>
    <text x="724" y="314" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#8b5e3c">D</text>
  </g>

  <!-- Constellation accents -->
  <g stroke="#c45c26" stroke-opacity="0.25" fill="none">
    <path d="M140 420 L200 360 L260 390 L320 330 L400 370"/>
  </g>
  <g fill="#c45c26">
    <circle cx="140" cy="420" r="2.5" opacity="0.4"/>
    <circle cx="200" cy="360" r="3" opacity="0.45"/>
    <circle cx="260" cy="390" r="2.2" opacity="0.35"/>
    <circle cx="320" cy="330" r="2.8" opacity="0.4"/>
    <circle cx="400" cy="370" r="2.4" opacity="0.35"/>
  </g>

  <!-- Caption ribbon -->
  <rect x="480" y="360" width="280" height="36" rx="18" fill="#c45c26" fill-opacity="0.1"/>
  <text x="620" y="383" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6b5c50">Life Clock · local · calm</text>

  <!-- Corner ornaments -->
  <path d="M140 110 h24 M140 110 v24" stroke="#c45c26" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <path d="M820 110 h-24 M820 110 v24" stroke="#2f6f5e" stroke-opacity="0.35" stroke-width="1.5" fill="none"/>
  <path d="M140 430 h24 M140 430 v-24" stroke="#2f6f5e" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>
  <path d="M820 430 h-24 M820 430 v-24" stroke="#c45c26" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>

  <!-- Secondary narrative strip (design motif) -->
  <g opacity="0.9">
    <rect x="150" y="455" width="660" height="52" rx="16" fill="#fffdf9" fill-opacity="0.45" stroke="#3c2a1c" stroke-opacity="0.06"/>
    <circle cx="180" cy="481" r="8" fill="#c45c26" fill-opacity="0.35"/>
    <circle cx="210" cy="481" r="8" fill="#e8a87c" fill-opacity="0.4"/>
    <circle cx="240" cy="481" r="8" fill="#2f6f5e" fill-opacity="0.35"/>
    <text x="270" y="477" font-family="Georgia, serif" font-size="11" fill="#6b5c50">Warm paper · soft depth · tabular time</text>
    <text x="270" y="494" font-family="ui-monospace, monospace" font-size="10" fill="#9a8b7c">birth → persist → restore → tick  ·  localStorage  ·  no account</text>
  </g>

  <!-- Micro sparkles -->
  <g fill="#c45c26" opacity="0.25">
    <circle cx="90" cy="80" r="1.5"/>
    <circle cx="110" cy="140" r="1.2"/>
    <circle cx="860" cy="200" r="1.4"/>
    <circle cx="880" cy="320" r="1.1"/>
    <circle cx="70" cy="300" r="1.3"/>
    <circle cx="900" cy="80" r="1.6"/>
    <circle cx="50" cy="200" r="1.1"/>
    <circle cx="940" cy="260" r="1.2"/>
    <circle cx="40" cy="450" r="1.3"/>
    <circle cx="920" cy="450" r="1.0"/>
  </g>

  <!-- Quiet legend for first-party asset catalog -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#9a8b7c">
    <text x="150" y="40">assets/ornament.svg · Life Clock visual system</text>
    <text x="150" y="54">tokens: warm paper · ember accent · forest teal · soft depth</text>
    <text x="150" y="68">purpose: first-party illustration counted toward shipped page weight</text>
  </g>
</svg>

<!-- end ornament · calm craft local · design mass for first-party ship weight · life-clock -->

