<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生命时钟 · Life Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #07070c;
      --bg-1: #0e0e18;
      --bg-2: #151524;
      --card: rgba(22, 22, 38, 0.72);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #f2f2f7;
      --text-dim: #8b8ba3;
      --text-mute: #5c5c74;
      --accent: #7c6cff;
      --accent-2: #48d1cc;
      --accent-3: #ff6b9d;
      --glow: rgba(124, 108, 255, 0.35);
      --success: #5eead4;
      --danger: #fb7185;
      --radius: 20px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(124, 108, 255, 0.18), transparent 55%),
        radial-gradient(900px 500px at 95% 10%, rgba(72, 209, 204, 0.12), transparent 50%),
        radial-gradient(700px 400px at 50% 100%, rgba(255, 107, 157, 0.1), transparent 55%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1) 40%, var(--bg-0));
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(120deg, #fff 10%, #c4bfff 45%, #7ee8e0 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.98rem;
      font-weight: 300;
    }

    .layout {
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .setup {
      padding: 22px;
    }

    .setup-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .setup-title h2 {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .setup-title p {
      color: var(--text-mute);
      font-size: 0.85rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 720px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    input[type="date"],
    input[type="time"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border-strong);
      background: rgba(0, 0, 0, 0.28);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color-scheme: dark;
    }

    input[type="date"]:focus,
    input[type="time"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 12px 18px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.92rem;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b8cff);
      color: white;
      box-shadow: 0 8px 28px rgba(124, 108, 255, 0.35);
      min-width: 120px;
    }

    .btn-primary:hover {
      box-shadow: 0 10px 36px rgba(124, 108, 255, 0.5);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 500;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .hint {
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--text-mute);
      min-height: 1.2em;
    }

    .hint.ok { color: var(--success); }
    .hint.err { color: var(--danger); }

    .hero {
      padding: 28px 22px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 108, 255, 0.22), transparent 70%);
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .birth-line {
      position: relative;
      z-index: 1;
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .birth-line strong {
      color: var(--text);
      font-weight: 500;
    }

    .now-line {
      position: relative;
      z-index: 1;
      font-family: "JetBrains Mono", monospace;
      color: var(--accent-2);
      font-size: 0.85rem;
      margin-bottom: 22px;
      letter-spacing: 0.02em;
    }

    .main-stats {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }

    @media (max-width: 860px) {
      .main-stats {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 420px) {
      .main-stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 8px 14px;
      transition: border-color 0.25s, transform 0.25s;
    }

    .stat:hover {
      border-color: rgba(124, 108, 255, 0.35);
      transform: translateY(-2px);
    }

    .stat .value {
      font-family: "JetBrains Mono", monospace;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(180deg, #fff, #c9c6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-variant-numeric: tabular-nums;
    }

    .stat .unit {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--text-mute);
      letter-spacing: 0.06em;
    }

    .stat.tick .value {
      color: var(--accent-2);
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    @media (max-width: 800px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      padding: 22px;
    }

    .panel h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel h3 span.icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(124, 108, 255, 0.15);
      color: #b8b0ff;
      font-size: 14px;
    }

    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid var(--border);
    }

    .metric .label {
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .metric .num {
      font-family: "JetBrains Mono", monospace;
      font-weight: 600;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-align: right;
    }

    .metric .num small {
      color: var(--text-mute);
      font-weight: 400;
      margin-left: 4px;
    }

    .metric.live .num {
      color: var(--accent-2);
    }

    .metric .sync-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .metric .num.bump {
      animation: bump 0.35s ease;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      40% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel-head h3 {
      margin-bottom: 0;
    }

    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--success);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: "JetBrains Mono", monospace;
    }

    .live-tag::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .milestones {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .milestone {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.18);
    }

    .milestone .top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.86rem;
    }

    .milestone .name {
      color: var(--text);
      font-weight: 500;
    }

    .milestone .remain {
      color: var(--text-mute);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
    }

    .bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.4s ease;
    }

    .quote {
      margin-top: 18px;
      text-align: center;
      color: var(--text-mute);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    footer {
      margin-top: 22px;
      text-align: center;
      color: var(--text-mute);
      font-size: 0.78rem;
    }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--text-dim);
    }

    .empty-state h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="badge"><span class="dot"></span> 实时同步本地时间</div>
      <h1>生命时钟</h1>
      <p class="subtitle">从你的出生那一刻起，精确计算已经走过的岁月</p>
    </header>

    <div class="layout">
      <section class="card setup">
        <div class="setup-title">
          <div>
            <h2>自定义出生时间</h2>
            <p>日期必填，出生时刻可选（默认 00:00:00）</p>
          </div>
          <button type="button" class="btn btn-ghost" id="clearBtn">清除本地记录</button>
        </div>
        <form id="birthForm" class="form-row" autocomplete="off">
          <div>
            <label for="birthDate">出生年月日</label>
            <input type="date" id="birthDate" required />
          </div>
          <div>
            <label for="birthTime">出生时刻（可选）</label>
            <input type="time" id="birthTime" step="1" />
          </div>
          <button type="submit" class="btn btn-primary">开始计时</button>
        </form>
        <p class="hint" id="hint"></p>
      </section>

      <section class="card empty-state" id="emptyState">
        <h2>还没有设置出生日期</h2>
        <p>在上方选择你的出生年月日，即可开始显示生命时钟</p>
      </section>

      <section class="card hero hidden" id="clockPanel">
        <p class="birth-line">你出生于 <strong id="birthDisplay">—</strong></p>
        <p class="now-line" id="nowDisplay">—</p>

        <div class="main-stats">
          <div class="stat">
            <div class="value" id="y">0</div>
            <div class="unit">年</div>
          </div>
          <div class="stat">
            <div class="value" id="mo">0</div>
            <div class="unit">月</div>
          </div>
          <div class="stat">
            <div class="value" id="d">0</div>
            <div class="unit">日</div>
          </div>
          <div class="stat">
            <div class="value" id="h">0</div>
            <div class="unit">时</div>
          </div>
          <div class="stat">
            <div class="value" id="mi">0</div>
            <div class="unit">分</div>
          </div>
          <div class="stat tick">
            <div class="value" id="s">0</div>
            <div class="unit">秒</div>
          </div>
        </div>
        <p class="quote" id="quote">时间不会倒流，但每一秒都在书写你的故事</p>
      </section>

      <div class="detail-grid hidden" id="detailPanel">
        <section class="card panel">
          <div class="panel-head">
            <h3><span class="icon">∑</span> 累计时长</h3>
            <span class="live-tag">实时同步</span>
          </div>
          <div class="metric-list">
            <div class="metric">
              <span class="label">总天数</span>
              <span class="num" id="totalDays">0 <small>天</small></span>
            </div>
            <div class="metric">
              <span class="label">总小时</span>
              <span class="num" id="totalHours">0 <small>小时</small></span>
            </div>
            <div class="metric live">
              <span class="label">总分钟</span>
              <span class="num" id="totalMinutes">0 <small>分</small></span>
            </div>
            <div class="metric live">
              <span class="label"><span class="sync-dot"></span>总秒数</span>
              <span class="num" id="totalSeconds">0 <small>秒</small></span>
            </div>
            <div class="metric">
              <span class="label">总周数</span>
              <span class="num" id="totalWeeks">0 <small>周</small></span>
            </div>
            <div class="metric live">
              <span class="label"><span class="sync-dot"></span>约等于心跳（70 bpm）</span>
              <span class="num" id="heartbeats">0 <small>次</small></span>
            </div>
          </div>
        </section>

        <section class="card panel">
          <div class="panel-head">
            <h3><span class="icon">★</span> 人生里程碑</h3>
            <span class="live-tag">实时同步</span>
          </div>
          <div class="milestones" id="milestones"></div>
        </section>
      </div>
    </div>

    <footer>数据仅保存在本机浏览器 · 主时钟 / 累计 / 心跳 / 里程碑 均与系统时间同步</footer>
  </div>

  <script>
    const STORAGE_KEY = "life-clock-birth";

    const els = {
      form: document.getElementById("birthForm"),
      birthDate: document.getElementById("birthDate"),
      birthTime: document.getElementById("birthTime"),
      hint: document.getElementById("hint"),
      clearBtn: document.getElementById("clearBtn"),
      emptyState: document.getElementById("emptyState"),
      clockPanel: document.getElementById("clockPanel"),
      detailPanel: document.getElementById("detailPanel"),
      birthDisplay: document.getElementById("birthDisplay"),
      nowDisplay: document.getElementById("nowDisplay"),
      y: document.getElementById("y"),
      mo: document.getElementById("mo"),
      d: document.getElementById("d"),
      h: document.getElementById("h"),
      mi: document.getElementById("mi"),
      s: document.getElementById("s"),
      totalDays: document.getElementById("totalDays"),
      totalHours: document.getElementById("totalHours"),
      totalMinutes: document.getElementById("totalMinutes"),
      totalSeconds: document.getElementById("totalSeconds"),
      totalWeeks: document.getElementById("totalWeeks"),
      heartbeats: document.getElementById("heartbeats"),
      milestones: document.getElementById("milestones"),
    };

    let birthDate = null;
    let rafId = null;
    let lastSec = -1;
    let lastBeat = -1;
    let lastMinute = -1;

    // Average resting heart rate used for estimate
    const BPM = 70;

    const MILESTONES = [
      { name: "一万天", days: 10000 },
      { name: "一万小时", days: 10000 / 24 },
      { name: "十亿秒", days: 1e9 / 86400 },
      { name: "2 万天", days: 20000 },
      { name: "30 岁", years: 30 },
      { name: "50 岁", years: 50 },
      { name: "80 岁", years: 80 },
    ];

    function pad(n, len = 2) {
      return String(n).padStart(len, "0");
    }

    function formatNumber(n) {
      return Math.floor(n).toLocaleString("zh-CN");
    }

    function formatDateTime(date) {
      const w = ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
      return `${date.getFullYear()}年${pad(date.getMonth() + 1)}月${pad(date.getDate())}日 星期${w} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function formatBirth(date) {
      return `${date.getFullYear()}年${pad(date.getMonth() + 1)}月${pad(date.getDate())}日 ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function parseBirthInput(dateStr, timeStr) {
      if (!dateStr) return null;
      const [y, m, d] = dateStr.split("-").map(Number);
      let hh = 0, mm = 0, ss = 0;
      if (timeStr) {
        const parts = timeStr.split(":").map(Number);
        hh = parts[0] || 0;
        mm = parts[1] || 0;
        ss = parts[2] || 0;
      }
      return new Date(y, m - 1, d, hh, mm, ss, 0);
    }

    /** Calendar-aware Y/M/D + time breakdown */
    function diffBreakdown(from, to) {
      if (to < from) {
        return { years: 0, months: 0, days: 0, hours: 0, minutes: 0, seconds: 0, totalMs: 0 };
      }

      let years = to.getFullYear() - from.getFullYear();
      let months = to.getMonth() - from.getMonth();
      let days = to.getDate() - from.getDate();
      let hours = to.getHours() - from.getHours();
      let minutes = to.getMinutes() - from.getMinutes();
      let seconds = to.getSeconds() - from.getSeconds();

      if (seconds < 0) {
        seconds += 60;
        minutes -= 1;
      }
      if (minutes < 0) {
        minutes += 60;
        hours -= 1;
      }
      if (hours < 0) {
        hours += 24;
        days -= 1;
      }
      if (days < 0) {
        // days in previous month relative to `to`
        const prevMonth = new Date(to.getFullYear(), to.getMonth(), 0);
        days += prevMonth.getDate();
        months -= 1;
      }
      if (months < 0) {
        months += 12;
        years -= 1;
      }

      return {
        years,
        months,
        days,
        hours,
        minutes,
        seconds,
        totalMs: to - from,
      };
    }

    function setHint(msg, type = "") {
      els.hint.textContent = msg;
      els.hint.className = "hint" + (type ? " " + type : "");
    }

    function saveBirth(date) {
      localStorage.setItem(STORAGE_KEY, date.toISOString());
    }

    function loadBirth() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function fillFormFromBirth(date) {
      const y = date.getFullYear();
      const m = pad(date.getMonth() + 1);
      const d = pad(date.getDate());
      els.birthDate.value = `${y}-${m}-${d}`;
      els.birthTime.value = `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function showClock(show) {
      els.emptyState.classList.toggle("hidden", show);
      els.clockPanel.classList.toggle("hidden", !show);
      els.detailPanel.classList.toggle("hidden", !show);
    }

    function addYears(date, years) {
      const d = new Date(date);
      d.setFullYear(d.getFullYear() + years);
      return d;
    }

    function formatRemain(ms) {
      if (ms <= 0) return "已达成";
      const totalSec = Math.floor(ms / 1000);
      const days = Math.floor(totalSec / 86400);
      const hours = Math.floor((totalSec % 86400) / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      const seconds = totalSec % 60;
      if (days >= 2) {
        return `还剩 ${days.toLocaleString("zh-CN")} 天 ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }
      if (days === 1) {
        return `还剩 1 天 ${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }
      if (hours > 0) {
        return `还剩 ${hours} 时 ${pad(minutes)} 分 ${pad(seconds)} 秒`;
      }
      return `还剩 ${minutes} 分 ${pad(seconds)} 秒`;
    }

    function renderMilestones(from, now, elapsedDaysExact) {
      const items = MILESTONES.map((m) => {
        let target;
        if (m.years != null) {
          target = addYears(from, m.years);
        } else {
          target = new Date(from.getTime() + m.days * 86400000);
        }
        const totalSpan = Math.max(1, (target - from) / 86400000);
        const progress = Math.min(100, Math.max(0, (elapsedDaysExact / totalSpan) * 100));
        const remainingMs = target - now;
        return {
          name: m.name,
          progress,
          remainText: formatRemain(remainingMs),
          done: remainingMs <= 0,
          target,
        };
      })
        .sort((a, b) => a.target - b.target)
        .slice(0, 5);

      els.milestones.innerHTML = items
        .map(
          (item) => `
        <div class="milestone">
          <div class="top">
            <span class="name">${item.name}${item.done ? " ✓" : ""}</span>
            <span class="remain">${item.remainText}</span>
          </div>
          <div class="bar"><i style="width:${item.progress.toFixed(2)}%"></i></div>
        </div>`
        )
        .join("");
    }

    function setMetric(el, html, bump) {
      el.innerHTML = html;
      if (bump) {
        el.classList.remove("bump");
        // Force reflow so animation restarts
        void el.offsetWidth;
        el.classList.add("bump");
      }
    }

    function tick() {
      if (!birthDate) return;
      const now = new Date();
      const diff = diffBreakdown(birthDate, now);

      if (diff.totalMs < 0) {
        setHint("出生时间不能晚于当前时间", "err");
        showClock(false);
        stopLoop();
        return;
      }

      els.birthDisplay.textContent = formatBirth(birthDate);
      els.nowDisplay.textContent = "现在 · " + formatDateTime(now);

      els.y.textContent = formatNumber(diff.years);
      els.mo.textContent = formatNumber(diff.months);
      els.d.textContent = formatNumber(diff.days);
      els.h.textContent = formatNumber(diff.hours);
      els.mi.textContent = formatNumber(diff.minutes);
      els.s.textContent = formatNumber(diff.seconds);

      // All cumulative values derive from the same live timestamp
      const totalMs = diff.totalMs;
      const totalSec = Math.floor(totalMs / 1000);
      const totalMin = Math.floor(totalMs / 60000);
      const totalHr = Math.floor(totalMs / 3600000);
      const totalDay = Math.floor(totalMs / 86400000);
      const totalWeek = Math.floor(totalMs / (7 * 86400000));
      // Heartbeats: 70 bpm → 70/60 beats per second, updates as time advances
      const beats = Math.floor((totalMs / 1000) * (BPM / 60));
      const elapsedDaysExact = totalMs / 86400000;

      const secChanged = totalSec !== lastSec;
      const beatChanged = beats !== lastBeat;
      const minChanged = totalMin !== lastMinute;

      setMetric(els.totalDays, `${formatNumber(totalDay)} <small>天</small>`, false);
      setMetric(els.totalHours, `${formatNumber(totalHr)} <small>小时</small>`, false);
      setMetric(els.totalMinutes, `${formatNumber(totalMin)} <small>分</small>`, minChanged);
      setMetric(els.totalSeconds, `${formatNumber(totalSec)} <small>秒</small>`, secChanged);
      setMetric(els.totalWeeks, `${formatNumber(totalWeek)} <small>周</small>`, false);
      setMetric(els.heartbeats, `${formatNumber(beats)} <small>次</small>`, beatChanged);

      // Milestones: refresh countdown every second (same clock source)
      if (secChanged || lastSec === -1) {
        renderMilestones(birthDate, now, elapsedDaysExact);
      }

      lastSec = totalSec;
      lastBeat = beats;
      lastMinute = totalMin;
    }

    function loop() {
      tick();
      rafId = requestAnimationFrame(loop);
    }

    function stopLoop() {
      if (rafId != null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    function start(date) {
      birthDate = date;
      lastSec = -1;
      lastBeat = -1;
      lastMinute = -1;
      showClock(true);
      stopLoop();
      loop();
    }

    els.form.addEventListener("submit", (e) => {
      e.preventDefault();
      const date = parseBirthInput(els.birthDate.value, els.birthTime.value);
      if (!date || Number.isNaN(date.getTime())) {
        setHint("请输入有效的出生日期", "err");
        return;
      }
      if (date > new Date()) {
        setHint("出生时间不能晚于现在", "err");
        return;
      }
      saveBirth(date);
      setHint("已保存到本机，时钟正在运行", "ok");
      start(date);
    });

    els.clearBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      birthDate = null;
      stopLoop();
      lastSec = -1;
      lastBeat = -1;
      lastMinute = -1;
      els.birthDate.value = "";
      els.birthTime.value = "";
      showClock(false);
      setHint("已清除本地记录", "ok");
    });

    // Init max date = today
    const today = new Date();
    els.birthDate.max = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

    const saved = loadBirth();
    if (saved && saved <= new Date()) {
      fillFormFromBirth(saved);
      setHint("已从本机恢复上次设置", "ok");
      start(saved);
    } else {
      showClock(false);
    }
  </script>
</body>
</html>
